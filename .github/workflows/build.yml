---
name: build

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - renovate/**
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "samples/**"
      - "grafana/**"
      - "systemd/**"
      - ".renovaterc.json"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "samples/**"
      - "grafana/**"
      - "systemd/**"
      - ".renovaterc.json"

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euox pipefail {0}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - name: Tidy go.mod
        run: go mod tidy
      - name: Run linters
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          # renovate: depName=golangci/golangci-lint datasource=github-releases
          version: v2.12.2
          args: --timeout=3m0s
          install-mode: goinstall
      - name: Run tests
        run: go test -v -race -coverpkg=./... -coverprofile ./coverage.out -covermode=atomic -timeout 20m ./...
      - name: Print coverage results
        run: go tool cover -func ./coverage.out
      - name: Send coverage
        uses: codecov/codecov-action@v7.0.0
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Build with Goreleaser
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          # renovate: depName=goreleaser/goreleaser datasource=github-releases
          version: v2.16.0
          args: build --snapshot --clean --single-target
        env:
          PRIVATE_ACCESS_TOKEN: placeholder
      - name: Check for dirty files
        run: git diff --exit-code

  # the exporter targets Windows and macOS too, and the integration tests
  # exercise OS-dependent behavior (process exec, paths, the fake binary
  # build), so run the test suite on both in addition to the Linux run above
  test-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -timeout 20m ./...

  chart:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
      - name: Lint chart
        run: ct lint --config .ct.yaml --all
      - name: Check that the chart README is current
        run: |
          docker run --rm -v "$(pwd):/helm-docs" -u "$(id -u)" jnorwood/helm-docs:v1.14.2
          git diff --exit-code charts/
      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
      - name: Install chart
        run: ct install --config .ct.yaml --all
