version: "3"

tasks:
  fmt:
    desc: format code
    cmds:
      - go mod tidy
      - go fix ./...
      - golangci-lint run --fix ./...
      - golangci-lint fmt ./...
      - git ls-files '*.sh' | xargs shfmt -w -i 2 -ci -sr

  lint:
    desc: lint everything (code, docs, scripts, release config)
    cmds:
      - task: lint:go
      - task: lint:assets
      - goreleaser check

  lint:go:
    desc: lint go code and module tidiness (what CI covers via golangci)
    cmds:
      - go mod tidy --diff
      - golangci-lint run ./...

  # runs in CI as its own step; shell linting targets tracked files only, so
  # local scratch space and generated output stay out of scope
  lint:assets:
    desc: lint markdown and shell scripts
    cmds:
      - markdownlint '**/*.md'
      - git ls-files '*.sh' | xargs shellcheck
      - git ls-files '*.sh' | xargs shfmt -d -i 2 -ci -sr

  release:
    desc: release
    vars:
      NEXT:
        sh: svu next
    cmds:
      - git tag -a {{.NEXT}} -m "{{.NEXT}}"
      - echo {{.NEXT}}
      - git push origin {{.NEXT}}
