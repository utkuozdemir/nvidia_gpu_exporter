---
version: 2
before:
  hooks:
    - go mod download

builds:
  - id: nvidia_gpu_exporter
    main: ./cmd/nvidia_gpu_exporter
    binary: nvidia_gpu_exporter
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{.Version}}
      - -X github.com/prometheus/common/version.Revision={{.Commit}}
      - -X github.com/prometheus/common/version.Branch={{.Branch}}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser
      - -X github.com/prometheus/common/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm64

  # The nvml flavor carries the experimental --collect.backend=nvml backend,
  # which needs cgo (go-nvml). It is a separate artifact so the main builds
  # above stay CGO_ENABLED=0 and fully static. Linux amd64 only for now:
  # arm64 needs a cross C toolchain in CI, deferred until the backend leaves
  # experimental.
  - id: nvidia_gpu_exporter-nvml
    main: ./cmd/nvidia_gpu_exporter
    binary: nvidia_gpu_exporter
    ldflags:
      - -s -w
      # this flavor exists for the nvml backend, so it defaults to it
      - -X github.com/utkuozdemir/nvidia_gpu_exporter/internal/app.DefaultBackend=nvml
      - -X github.com/prometheus/common/version.Version={{.Version}}
      - -X github.com/prometheus/common/version.Revision={{.Commit}}
      - -X github.com/prometheus/common/version.Branch={{.Branch}}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser
      - -X github.com/prometheus/common/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: nvidia_gpu_exporter-nvml-archive
    name_template: >-
      {{ .ProjectName }}-nvml_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    ids:
      - nvidia_gpu_exporter-nvml
    files:
      - LICENSE

  - id: nvidia_gpu_exporter-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}
      {{- if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}
    ids:
      - nvidia_gpu_exporter
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE

nfpms:
  - id: nvidia_gpu_exporter
    # only the static build; the cgo nvml flavor must never leak into the packages
    ids:
      - nvidia_gpu_exporter
    package_name: nvidia-gpu-exporter
    bindir: /usr/bin
    vendor: Utku Ozdemir
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    license: MIT
    maintainer: Utku Ozdemir <utkuozdemir@gmail.com>
    section: misc
    description: |-
      Nvidia GPU exporter for prometheus.
      This is a simple exporter that uses `nvidia-smi(.exe)` binary to collect, 
      parse and export metrics.
    formats:
      - deb
      - rpm
    contents:
      - src: ./install/systemd/nvidia_gpu_exporter.service
        dst: /usr/lib/systemd/system/nvidia_gpu_exporter.service
        file_info:
          owner: root
          group: root
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/nvidia-gpu-exporter/copyright
        file_info:
          owner: root
          group: root
          mode: 0644
    scripts:
      preinstall: install/scripts/pre-install.sh
      postinstall: install/scripts/post-install.sh
      preremove: install/scripts/pre-remove.sh
      postremove: install/scripts/post-remove.sh
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package
        - no-manual-page
        # Probably won't be implemented: https://github.com/goreleaser/nfpm/issues/15#issuecomment-830816661
        - maintainer-script-calls-systemctl

checksum:
  name_template: checksums.txt
  algorithm: sha256

# One detached signature over checksums.txt covers every binary, archive and
# package, since the file lists their sha256 sums. The passphrase comes in on
# stdin so it never lands on the process command line or in the logs. Skipped
# in snapshot builds, so no key is needed for PR CI.
signs:
  - id: checksums
    cmd: gpg
    artifacts: checksum
    signature: "${artifact}.asc"
    stdin: "{{ .Env.GPG_PASSPHRASE }}"
    args:
      - "--batch"
      - "--no-tty"
      - "--pinentry-mode=loopback"
      - "--passphrase-fd=0"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--armor"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

git:
  ignore_tags: # skip prereleases when finding the previous tag for the changelog
    - "*-*"

changelog:
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: "Performance Improvements"
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: "Documentation"
      regexp: '^docs(\(.+\))?:'
      order: 3
    - title: "Refactors & Internal Changes"
      regexp: '^refactor(\(.+\))?:'
      order: 4
    - title: "Dependency Updates"
      regexp: '^chore\(deps\):'
      order: 5
    - title: "Build, CI & Chores"
      regexp: '^(build|ci|cd|cicd|docker|test|chore)(\(.+\))?:'
      order: 6
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - Merge pull request
      - Merge branch
      - go mod tidy

dockers_v2:
  - id: nvidia_gpu_exporter
    images:
      - docker.io/utkuozdemir/nvidia_gpu_exporter
      - ghcr.io/utkuozdemir/nvidia_gpu_exporter
    # only the static build; the cgo nvml flavor must never leak into this image
    ids:
      - nvidia_gpu_exporter
    tags:
      - "{{ .Version }}" # keep the existing no-"v" tag scheme (e.g. 1.4.1)
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64

  # The nvml flavor as a tag variant of the same image (postgres:16-alpine
  # style): carries the cgo binary and defaults to the nvml backend.
  - id: nvidia_gpu_exporter-nvml
    images:
      - docker.io/utkuozdemir/nvidia_gpu_exporter
      - ghcr.io/utkuozdemir/nvidia_gpu_exporter
    dockerfile: Dockerfile.nvml
    ids:
      - nvidia_gpu_exporter-nvml
    tags:
      - "{{ .Version }}-nvml"
      - "{{ if not .Prerelease }}latest-nvml{{ end }}"
    platforms:
      - linux/amd64

scoops:
  - repository:
      owner: utkuozdemir
      name: scoop_nvidia_gpu_exporter
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
    commit_author:
      name: Utku Ozdemir
      email: utkuozdemir@gmail.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    description: Nvidia GPU exporter for prometheus using nvidia-smi binary
    license: MIT

winget:
  - name: nvidia_gpu_exporter
    publisher: utkuozdemir
    package_identifier: utkuozdemir.nvidia_gpu_exporter
    package_name: Nvidia GPU Exporter
    short_description: Nvidia GPU exporter for prometheus using nvidia-smi binary
    description: >-
      Nvidia GPU exporter for prometheus, using the nvidia-smi binary to collect,
      parse and export GPU metrics. Supports running as a native Windows service.
    license: MIT
    license_url: https://github.com/utkuozdemir/nvidia_gpu_exporter/blob/main/LICENSE
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    publisher_url: https://github.com/utkuozdemir
    publisher_support_url: https://github.com/utkuozdemir/nvidia_gpu_exporter/issues
    # Built from the Windows zip archive (nested portable exe).
    ids:
      - nvidia_gpu_exporter-archive
    release_notes: "{{ .Changelog }}"
    tags:
      - prometheus
      - nvidia
      - gpu
      - exporter
      - monitoring
    repository:
      owner: utkuozdemir
      name: winget-pkgs
      branch: "nvidia_gpu_exporter-{{ .Version }}"
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
