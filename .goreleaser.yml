---
version: 2
before:
  hooks:
    - go mod download

builds:
  - id: nvidia_gpu_exporter
    main: ./cmd/nvidia_gpu_exporter
    binary: nvidia_gpu_exporter
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{.Version}}
      - -X github.com/prometheus/common/version.Revision={{.Commit}}
      - -X github.com/prometheus/common/version.Branch={{.Branch}}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser
      - -X github.com/prometheus/common/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm64

archives:
  - id: nvidia_gpu_exporter-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}
      {{- if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}
    ids:
      - nvidia_gpu_exporter
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE

nfpms:
  - id: nvidia_gpu_exporter
    package_name: nvidia-gpu-exporter
    bindir: /usr/bin
    vendor: Utku Ozdemir
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    license: MIT
    maintainer: Utku Ozdemir <utkuozdemir@gmail.com>
    section: misc
    description: |-
      Nvidia GPU exporter for prometheus.
      This is a simple exporter that uses `nvidia-smi(.exe)` binary to collect, 
      parse and export metrics.
    formats:
      - deb
      - rpm
    contents:
      - src: ./systemd/nvidia_gpu_exporter.service
        dst: /usr/lib/systemd/system/nvidia_gpu_exporter.service
        file_info:
          owner: root
          group: root
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/nvidia-gpu-exporter/copyright
        file_info:
          owner: root
          group: root
          mode: 0644
    scripts:
      preinstall: scripts/pre-install.sh
      postinstall: scripts/post-install.sh
      preremove: scripts/pre-remove.sh
      postremove: scripts/post-remove.sh
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package
        - no-manual-page
        # Probably won't be implemented: https://github.com/goreleaser/nfpm/issues/15#issuecomment-830816661
        - maintainer-script-calls-systemctl

checksum:
  name_template: checksums.txt
  algorithm: sha256

git:
  ignore_tags: # skip prereleases when finding the previous tag for the changelog
    - "*-*"

changelog:
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: "Performance Improvements"
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: "Documentation"
      regexp: '^docs(\(.+\))?:'
      order: 3
    - title: "Refactors & Internal Changes"
      regexp: '^refactor(\(.+\))?:'
      order: 4
    - title: "Dependency Updates"
      regexp: '^chore\(deps\):'
      order: 5
    - title: "Build, CI & Chores"
      regexp: '^(build|ci|cd|cicd|docker|test|chore)(\(.+\))?:'
      order: 6
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - Merge pull request
      - Merge branch
      - go mod tidy

dockers_v2:
  - images:
      - docker.io/utkuozdemir/nvidia_gpu_exporter
      - ghcr.io/utkuozdemir/nvidia_gpu_exporter
    tags:
      - "{{ .Version }}" # keep the existing no-"v" tag scheme (e.g. 1.4.1)
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64

scoops:
  - repository:
      owner: utkuozdemir
      name: scoop_nvidia_gpu_exporter
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
    commit_author:
      name: Utku Ozdemir
      email: utkuozdemir@gmail.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    description: Nvidia GPU exporter for prometheus using nvidia-smi binary
    license: MIT

winget:
  - name: nvidia_gpu_exporter
    # Publishing is paused until the initial submissions clear human review:
    # https://github.com/microsoft/winget-pkgs/pull/394494
    # https://github.com/microsoft/winget-pkgs/pull/396604
    # Manifests are still generated under dist/, but nothing is pushed and no
    # PR is opened against microsoft/winget-pkgs. Set back to false to resume
    # publishing.
    skip_upload: true
    publisher: utkuozdemir
    package_identifier: utkuozdemir.nvidia_gpu_exporter
    package_name: Nvidia GPU Exporter
    short_description: Nvidia GPU exporter for prometheus using nvidia-smi binary
    description: >-
      Nvidia GPU exporter for prometheus, using the nvidia-smi binary to collect,
      parse and export GPU metrics. Supports running as a native Windows service.
    license: MIT
    license_url: https://github.com/utkuozdemir/nvidia_gpu_exporter/blob/main/LICENSE
    homepage: https://github.com/utkuozdemir/nvidia_gpu_exporter
    publisher_url: https://github.com/utkuozdemir
    publisher_support_url: https://github.com/utkuozdemir/nvidia_gpu_exporter/issues
    # Built from the Windows zip archive (nested portable exe).
    ids:
      - nvidia_gpu_exporter-archive
    release_notes: "{{ .Changelog }}"
    tags:
      - prometheus
      - nvidia
      - gpu
      - exporter
      - monitoring
    repository:
      owner: utkuozdemir
      name: winget-pkgs
      branch: "nvidia_gpu_exporter-{{ .Version }}"
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
