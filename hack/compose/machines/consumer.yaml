# Machine "consumer": an eight-GPU consumer inference box, one card deliberately
# sick. Served by BOTH dev-stack flavors (exec-consumer replays it through
# the fake nvidia-smi, nvml-consumer through the demo backend), so the two data
# sources show the same machine and differences between them are real
# surface differences. Editing this file changes the next scrape of both
# flavors, no restart. Field names are nvidia-smi query fields (see
# internal/captures/README.md).
# the 4080 SUPER capture is one of the two the demo backend embeds, so the
# same file drives both flavors
capture: linux-x86_64__nvidia-geforce-rtx-4080-super__595.71.05
state: load

# Realistic jitter around the captured values for everything that naturally
# moves: utilization, temperature, power draw, current clocks, fan speed and
# memory (including per-process). An explicit override below beats the jitter.
fluctuate: true

# Eight cards from the single-GPU capture, each with a stable generated uuid,
# so the GPU selector, per-GPU filtering and per-process rows can be exercised
# without hardware. The last card is deliberately sick to preview the health
# banner, the throttle timeline and the temperature alert colors: select it in
# the GPU dropdown to see the red states.
gpus:
  - {}
  - {}
  - {}
  - {}
  - {}
  - {}
  - {}
  - overrides:
      gpu_recovery_action: "Node Reboot"
      temperature.gpu: 93
      clocks_event_reasons.hw_thermal_slowdown: 1
      # memory-repair states for the alert rules: remap failed (RMA
      # criterion), a remap and a page retirement waiting for a reset.
      # Yes/No enum fields, the exporter maps them to 1/0.
      remapped_rows.failure: "Yes"
      remapped_rows.pending: "Yes"
      retired_pages.pending: "Yes"
      # ECC preview on the sick card only: the 4080 capture reports no ECC,
      # these force the banner tile red + populate the datacenter ECC detail
      # panel. Healthy cards keep "No ECC" so the overview dashboard can show
      # the sick/healthy contrast. Delete to restore "No ECC" everywhere
      # (series go stale on the next scrape).
      ecc.errors.uncorrected.aggregate.total:   5
      ecc.errors.uncorrected.aggregate.dram:    3
      ecc.errors.uncorrected.aggregate.sram:    2
      ecc.errors.uncorrected.volatile.total:    1

overrides:
  # screenshot mode: a busy inference box. These beat the capture-anchored
  # jitter so gauges sit in the colorful upper ranges (memory flirts with the
  # warning band, temperature reaches yellow on healthy cards). Delete this
  # block to fall back to values jittering around the capture.
  utilization.gpu:    {min: 72,   max: 99}
  utilization.memory: {min: 40,   max: 88}
  memory.used:        {min: 11000, max: 15600}
  power.draw:         {min: 240,  max: 385}
  fan.speed:          {min: 55,   max: 92}
  temperature.gpu:    {min: 62,   max: 79}
  used_gpu_memory:    {min: 800,  max: 6000}
  # the capture's load clocks sit near the reported maxima, so the jitter can
  # overshoot 100% on the clock gauges (harmless, real overclocked cards do
  # that too, but it looks odd in screenshots) - keep them just under max
  # (memory max 11501 MHz, graphics max 3165 MHz on this capture)
  clocks.current.memory:   {min: 10400, max: 11480}
  clocks.current.graphics: {min: 2500, max: 3140}
  # states the jitter does not cover. Integer 0:1 flips a flag ~50/50 per
  # scrape and per GPU; bare integers parse fine for pstate and compute mode.
  # Only flags WITHOUT an alert rule flip randomly: the alertable slowdown
  # flags (hw_thermal, sw_thermal, hw_power_brake) stay 0 on healthy cards so
  # they cannot flicker pending alerts, and the sick card pins its own.
  clocks_event_reasons.sw_power_cap:                {min: 0, max: 1}
  clocks_event_reasons.sync_boost:                  {min: 0, max: 1}
  clocks_event_reasons.hw_thermal_slowdown:         0
  clocks_event_reasons.gpu_idle:                    {min: 0, max: 1}
  clocks_event_reasons.sw_thermal_slowdown:         0
  clocks_event_reasons.hw_power_brake_slowdown:     0
  clocks_event_reasons.applications_clocks_setting: {min: 0, max: 1}
  compute_mode:                                     {min: 0, max: 3}
  pstate:                                           {min: 0, max: 5}  # busy states, coherent with the load
  # recovery action / fabric state are enum-string fields: ranges cannot
  # drive them (bare integers are rejected), only fixed strings like the
  # per-GPU gpu_recovery_action above. ECC errors are also per-GPU overrides
  # on the sick card, so healthy cards keep reporting "No ECC".
