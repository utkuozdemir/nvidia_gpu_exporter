global:
  # short interval so the dashboard moves quickly while iterating
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    # distinguishes this Prometheus's alerts from the demo flavor's in
    # Alertmanager; without it identical alerts from both backends dedupe
    backend: exec

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "nvidia_gpu_exporter"
    static_configs:
      # the instance label names the simulated machine, matching the nvml
      # flavor's Prometheus, so switching the Grafana data source keeps the
      # node selection pointed at the same machine
      - targets: ["exec-consumer:9835"]
        labels:
          instance: consumer
      - targets: ["exec-datacenter:9835"]
        labels:
          instance: datacenter
      # only up when the stack runs with --profile broken; a down target
      # produces no nvidia_smi_* series, so no alerts while absent
      - targets: ["exec-broken:9835"]
        labels:
          instance: broken
