global:
  # short interval so the dashboard moves quickly while iterating
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nvidia_gpu_exporter"
    static_configs:
      # the instance label names the simulated machine, matching the nvml
      # flavor's Prometheus, so switching the Grafana data source keeps the
      # node selection pointed at the same machine
      - targets: ["exec-consumer:9835"]
        labels:
          instance: consumer
      - targets: ["exec-datacenter:9835"]
        labels:
          instance: datacenter
