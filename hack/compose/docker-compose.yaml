services:
  prometheus:
    image: prom/prometheus:v3.13.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/data:/prometheus
      - ./prometheus/config:/etc/prometheus
  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/data:/var/lib/grafana
