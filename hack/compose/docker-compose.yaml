name: nvidia-gpu-exporter-dev

# Local dev stack: two simulated machines, each served through BOTH backend
# flavors, so the Grafana data source dropdown compares the same machine's
# exec surface against its NVML surface and every visible difference is a
# real surface difference (see README.md):
#   machine "consumer" (machines/consumer.yaml): eight consumer cards, one sick
#   machine "datacenter" (machines/datacenter.yaml): two H200s with MIG and XID history
#   exec flavor:  exec-consumer / exec-datacenter -> scraped by `prometheus` (:9090)
#   nvml flavor:  nvml-consumer / nvml-datacenter -> scraped by `prometheus-demo` (:9091)
# Both Prometheuses relabel the same machine to the same instance name
# ("consumer", "datacenter"), so switching the data source keeps the node selection.

services:
  exec-consumer:
    build:
      context: ../..
      dockerfile: hack/compose/Dockerfile
    command:
      - "--nvidia-smi-command=/usr/local/bin/fake-nvidia-smi --config /etc/machines/consumer.yaml"
      - "--collect.compute-apps"
    volumes:
      # mount the directory, not the file: editors replace the file via
      # atomic rename, which breaks a single-file bind mount (stale inode).
      # git operations that rewrite this directory (rebase, checkout) break
      # even the directory mount the same way - restart this service then.
      - ./machines:/etc/machines:ro
    ports:
      - "9835:9835"

  exec-datacenter:
    build:
      context: ../..
      dockerfile: hack/compose/Dockerfile
    command:
      - "--nvidia-smi-command=/usr/local/bin/fake-nvidia-smi --config /etc/machines/datacenter.yaml"
      - "--collect.compute-apps"
    volumes:
      - ./machines:/etc/machines:ro
    ports:
      - "9836:9835"

  nvml-consumer:
    build:
      context: ../..
      dockerfile: hack/compose/Dockerfile
    command:
      - "--collect.backend=demo"
      - "--demo-config=/etc/machines/consumer.yaml"
      - "--collect.compute-apps"
    volumes:
      - ./machines:/etc/machines:ro
    ports:
      - "9837:9835"

  nvml-datacenter:
    build:
      context: ../..
      dockerfile: hack/compose/Dockerfile
    command:
      - "--collect.backend=demo"
      - "--demo-config=/etc/machines/datacenter.yaml"
      - "--collect.compute-apps"
      - "--collect.compute-apps-mig"
    volumes:
      - ./machines:/etc/machines:ro
    ports:
      - "9838:9835"

  # opt-in failure box for the exporter self-health alerts: nvidia-smi exits
  # non-zero from boot. Start with: docker compose --profile broken up
  exec-broken:
    profiles: ["broken"]
    build:
      context: ../..
      dockerfile: hack/compose/Dockerfile
    command:
      - "--nvidia-smi-command=/usr/local/bin/fake-nvidia-smi --config /etc/machines/consumer.yaml --exit 15 --stderr-msg 'Unable to determine the device handle for GPU 0000:01:00.0'"
    volumes:
      - ./machines:/etc/machines:ro
    ports:
      - "9839:9835"

  prometheus:
    image: prom/prometheus:v3.13.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/config:/etc/prometheus
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - exec-consumer
      - exec-datacenter

  prometheus-demo:
    image: prom/prometheus:v3.13.1
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/config-demo:/etc/prometheus
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-demo-data:/prometheus
    depends_on:
      - nvml-consumer
      - nvml-datacenter

  alertmanager:
    image: prom/alertmanager:v0.33.1
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro

  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      # anonymous admin, no login prompt: it is a throwaway local stack
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - prometheus-demo

volumes:
  prometheus-data:
  prometheus-demo-data:
  grafana-data:
