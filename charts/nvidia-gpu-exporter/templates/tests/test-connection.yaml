{{- if .Values.service.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "nvidia-gpu-exporter.fullname" . }}-test-connection
  labels:
    # deliberately NOT the shared chart labels: they match the DaemonSet's
    # selector, and the DaemonSet controller deletes foreign pods matching it
    helm.sh/chart: {{ include "nvidia-gpu-exporter.chart" . }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
spec:
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  automountServiceAccountToken: false
  containers:
    {{- /* nil-safe lookups with inline fallbacks: upgrades with
    --reuse-values keep the previous release's values, where the test
    subtree may not exist yet */}}
    {{- $testImage := dig "image" (dict) (.Values.test | default dict) }}
    - name: wget
      image: "{{ $testImage.repository | default "docker.io/library/busybox" }}:{{ $testImage.tag | default "1.37" }}"
      imagePullPolicy: {{ $testImage.pullPolicy | default "IfNotPresent" }}
      # restricted-profile security context so the test pod passes admission
      # in namespaces enforcing the "restricted" Pod Security Standard
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      command:
        - sh
        - -c
      # retried because the test can start before the exporter finishes its
      # startup field detection and begins listening
      args:
        - |
          url='http://{{ include "nvidia-gpu-exporter.fullname" . }}:{{ .Values.service.port }}{{ .Values.telemetryPath }}'
          for attempt in $(seq 1 30); do
            wget -qO- "$url" && exit 0
            echo "attempt $attempt failed, retrying"
            sleep 2
          done
          echo "the exporter never became reachable at $url"
          exit 1
  restartPolicy: Never
{{- end }}
